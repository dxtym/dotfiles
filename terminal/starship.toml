format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$golang\
$fill\
$battery\
$time\
$line_break\
$character"""
command_timeout = 1000

[username]
style_user = 'white bold'
format = '[$user]($style)@'
show_always = true

[hostname]
ssh_only = false
style = 'green bold'

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"
read_only = " 󰌾"
read_only_style = 'read'
truncation_length = 5
truncation_symbol = "…/"

[git_branch]
symbol = " "
format = '[$symbol $branch]($style)'

[git_status]
format = '[ ($all_status$ahead_behind)]($style)'

[python]
symbol = " " 
format = '[$symbol ($version)]($style)'

[nodejs]
symbol = " "
format = '[$symbol ($version)]($style)'

[golang]
symbol = " "
format = '[$symbol ($version)]($style)'

[fill]
symbol = " "

[line_break]
symbol = "\n"

[battery]
full_symbol = '󰁹 '
charging_symbol = '󰂄 '
discharging_symbol = '󰂃 ' 
unknown_symbol = '󰁽 '
empty_symbol = '󰂎 ' 
format = '[$symbol$percentage ]($style)' 

[[battery.display]]
threshold = 90
style = 'bold green'

[[battery.display]]
threshold = 20
style = 'bold yellow'

[[battery.display]]
threshold = 10
style = 'bold red'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
format = '[ $time]($style)'
