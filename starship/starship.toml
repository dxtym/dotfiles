format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$docker_context\
$python\
$nodejs\
$golang\
$fill\
$cmd_duration\
$battery\
$line_break\
$character"""
command_timeout = 5000

[username]
style_root = 'red'
style_user = 'blue'
format = '[$user]($style) at '
show_always = true

[hostname]
format = '[$ssh_symbol](blue) on [$hostname](red) '
style = 'green bold'

[directory]
read_only = "󰌾"
style = 'blue'
format = '[$path]($style)[$read_only]($read_only_style)'
truncate_to_repo = false
read_only_style = 'red'
truncation_symbol = "󰏗 "
use_os_path_sep = false

[git_branch]
symbol = " "
style = 'purple'
only_attached = true

[git_status]
ahead = '↑'
behind = '↓'
diverged = '↕'
stashed = '≡'
up_to_date = '✓'
renamed = '>>'
deleted = '✗'
style = 'red'
ignore_submodules = true
windows_starship = '/usr/local/bin/starship'

[docker_context]
format = '[$symbol$context]($style)'
symbol = ' '
style = 'blue'

[python]
symbol = " "
style = 'yellow'
format = '[$symbol($version) ]($style)'

[nodejs]
symbol = " "
style = 'green'
not_capable_style = 'red'
format = '[$symbol($version) ]($style)'

[golang]
symbol = " "
style = 'cyan'
not_capable_style = 'red'
format = '[$symbol($version) ]($style)'

[fill]
symbol = ' '

[cmd_duration]
min_time = 1_000
style = 'yellow'
show_notifications = true

[[battery.display]]
threshold = 90
style = 'green'

[[battery.display]]
threshold = 20
style = 'yellow'

[[battery.display]]
threshold = 10
style = 'red'

[line_break]
symbol = "\n"
